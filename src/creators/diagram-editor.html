<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Diagram Editor</title>
    <link rel="stylesheet" href="./diagram-editor.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Diagram Editor</h1>
        <p id="status-text" class="status">Choose a tool, click canvas, drag to move.</p>
      </div>
      <div class="header-actions">
        <button id="btn-export-png" class="primary">Export PNG</button>
        <button id="btn-save-assets" class="primary">Save to Image Assets</button>
      </div>
    </header>

    <main class="layout">
      <aside class="panel left-panel">
        <h2>Tools</h2>
        <div class="tool-grid">
          <button data-tool="select" class="tool-btn active" title="Select" aria-label="Select">⌖</button>
          <button data-tool="rect" class="tool-btn" title="Rectangle" aria-label="Rectangle">▭</button>
          <button data-tool="rounded-rect" class="tool-btn" title="Rounded" aria-label="Rounded rectangle">▱</button>
          <button data-tool="square" class="tool-btn" title="Square" aria-label="Square">□</button>
          <button data-tool="ellipse" class="tool-btn" title="Ellipse" aria-label="Ellipse">◯</button>
          <button data-tool="circle" class="tool-btn" title="Circle" aria-label="Circle">○</button>
          <button data-tool="diamond" class="tool-btn" title="Diamond" aria-label="Diamond">◇</button>
          <button data-tool="parallelogram" class="tool-btn" title="Parallelogram" aria-label="Parallelogram">▱</button>
          <button data-tool="trapezoid" class="tool-btn" title="Trapezoid" aria-label="Trapezoid">⏢</button>
          <button data-tool="hexagon" class="tool-btn" title="Hexagon" aria-label="Hexagon">⬡</button>
          <button data-tool="triangle" class="tool-btn" title="Triangle" aria-label="Triangle">△</button>
          <button data-tool="arrow-right" class="tool-btn" title="Arrow right" aria-label="Arrow right">➜</button>
          <button data-tool="arrow-left" class="tool-btn" title="Arrow left" aria-label="Arrow left">⬅</button>
          <button data-tool="arrow-up" class="tool-btn" title="Arrow up" aria-label="Arrow up">⬆</button>
          <button data-tool="arrow-down" class="tool-btn" title="Arrow down" aria-label="Arrow down">⬇</button>
          <button data-tool="chevron" class="tool-btn" title="Chevron" aria-label="Chevron">❯</button>
          <button data-tool="star" class="tool-btn" title="Star" aria-label="Star">⭐</button>
          <button data-tool="pentagon" class="tool-btn" title="Pentagon" aria-label="Pentagon">⬠</button>
          <button data-tool="cylinder" class="tool-btn" title="Cylinder" aria-label="Cylinder">⌭</button>
          <button data-tool="cloud" class="tool-btn" title="Cloud" aria-label="Cloud">☁</button>
          <button data-tool="document" class="tool-btn" title="Document" aria-label="Document">⧉</button>
          <button data-tool="database" class="tool-btn" title="Database" aria-label="Database">⛁</button>
          <button data-tool="oval" class="tool-btn" title="Oval" aria-label="Oval">⬭</button>
          <button data-tool="note" class="tool-btn" title="Note" aria-label="Note">✎</button>
          <button data-tool="speech" class="tool-btn" title="Speech" aria-label="Speech bubble">🗨</button>
          <button data-tool="callout-rect" class="tool-btn" title="Callout" aria-label="Callout rectangle">💬</button>
          <button data-tool="callout-circle" class="tool-btn" title="Callout circle" aria-label="Callout circle">◗</button>
          <button data-tool="actor" class="tool-btn" title="Actor" aria-label="Actor">⚉</button>
          <button data-tool="crescent" class="tool-btn" title="Moon" aria-label="Moon">☾</button>
          <button data-tool="line" class="tool-btn" title="Line" aria-label="Line">─</button>
          <button data-tool="arrow-line" class="tool-btn" title="Arrow line" aria-label="Arrow line">↗</button>
          <button data-tool="double-arrow" class="tool-btn" title="Double arrow" aria-label="Double arrow">↔</button>
          <button data-tool="dashed-line" class="tool-btn" title="Dashed line" aria-label="Dashed line">┄</button>
          <button data-tool="wave" class="tool-btn" title="Wave" aria-label="Wave">≈</button>
          <button data-tool="hexagon-flat" class="tool-btn" title="Hexagon flat" aria-label="Hexagon flat">⬡</button>
          <button data-tool="plus" class="tool-btn" title="Plus" aria-label="Plus">＋</button>
          <button data-tool="minus" class="tool-btn" title="Minus" aria-label="Minus">－</button>
          <button data-tool="arrow-left-right" class="tool-btn" title="Arrow left-right" aria-label="Arrow left-right">↔</button>
          <button data-tool="right-arrow-bold" class="tool-btn" title="Arrow bold" aria-label="Arrow bold">➜</button>
          <button data-tool="flowchart-process" class="tool-btn" title="Process" aria-label="Process">▭</button>
          <button data-tool="flowchart-decision" class="tool-btn" title="Decision" aria-label="Decision">◇</button>
          <button data-tool="flowchart-terminator" class="tool-btn" title="Terminator" aria-label="Terminator">⬤</button>
          <button data-tool="flowchart-data" class="tool-btn" title="Data" aria-label="Data">▱</button>
          <button data-tool="callout-left" class="tool-btn" title="Callout left" aria-label="Callout left">◄</button>
          <button data-tool="callout-right" class="tool-btn" title="Callout right" aria-label="Callout right">►</button>
          <button data-tool="callout-up" class="tool-btn" title="Callout up" aria-label="Callout up">▲</button>
          <button data-tool="callout-down" class="tool-btn" title="Callout down" aria-label="Callout down">▼</button>
          <button data-tool="bracket-left" class="tool-btn" title="Bracket left" aria-label="Bracket left">[</button>
          <button data-tool="bracket-right" class="tool-btn" title="Bracket right" aria-label="Bracket right">]</button>
          <button data-tool="image-grid" class="tool-btn" title="Rectangular image grid" aria-label="Rectangular image grid">▦</button>
          <button data-tool="hex-image-grid" class="tool-btn" title="Hexagonal image grid" aria-label="Hexagonal image grid">⌬</button>
          <button data-tool="text" class="tool-btn" title="Text" aria-label="Text">T</button>
        </div>

        <h2>Actions</h2>
        <div class="tool-stack">
          <button id="btn-delete" class="action-btn danger" title="Delete selected" aria-label="Delete selected">🗑</button>
          <button id="btn-duplicate" class="action-btn" title="Duplicate selected" aria-label="Duplicate selected">⧉</button>
          <button id="btn-clear" class="action-btn" title="Clear canvas" aria-label="Clear canvas">✕</button>
          <button id="btn-crop" class="action-btn" title="Crop canvas to shapes" aria-label="Crop canvas to shapes">⊡</button>
        </div>
      </aside>

      <section class="canvas-panel">
        <div class="canvas-wrap" id="canvas-wrap">
          <svg id="diagram-svg" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" aria-label="Diagram canvas">
            <defs>
              <pattern id="gridPattern" width="20" height="20" patternUnits="userSpaceOnUse">
                <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#dfe3d8" stroke-width="1" />
              </pattern>
              <pattern id="majorGridPattern" width="100" height="100" patternUnits="userSpaceOnUse">
                <rect width="100" height="100" fill="url(#gridPattern)" />
                <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#c6ccbf" stroke-width="1.2" />
              </pattern>
              <marker id="arrowHead" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M0,0 L0,6 L9,3 z" fill="#2f5f4f"></path>
              </marker>
              <marker id="arrowHeadStart" markerWidth="12" markerHeight="12" refX="3" refY="3" orient="auto" markerUnits="strokeWidth">
                <path d="M9,0 L9,6 L0,3 z" fill="#2f5f4f"></path>
              </marker>
            </defs>
            <rect x="0" y="0" width="1400" height="900" fill="url(#majorGridPattern)"></rect>
            <g id="shape-layer"></g>
            <g id="selection-layer"></g>
          </svg>
        </div>
      </section>

      <aside class="panel right-panel">
        <h2>Style</h2>
        <section class="style-section" aria-label="Fill">
          <h3>Fill</h3>
          <label class="style-option"><input type="radio" name="fill-mode" value="none" /> No fill</label>
          <label class="style-option"><input type="radio" name="fill-mode" value="solid" checked /> Solid fill</label>
          <label class="style-option"><input type="radio" name="fill-mode" value="gradient" /> Gradient fill</label>
          <label class="style-option"><input type="radio" name="fill-mode" value="texture" /> Picture or texture fill</label>
          <label class="style-option"><input type="radio" name="fill-mode" value="pattern" /> Pattern fill</label>
          <label>Color
            <input id="fill-color" type="color" value="#e7f2ec" class="style-control" />
          </label>
          <div class="style-row">
            <label class="style-row-label" for="fill-transparency-range">Transparency</label>
            <input id="fill-transparency-range" type="range" min="0" max="100" value="0" class="style-control style-range" />
            <input id="fill-transparency-number" type="number" min="0" max="100" value="0" class="style-control style-percent" aria-label="Fill transparency percent" />
          </div>
        </section>

        <section class="style-section" aria-label="Line">
          <h3>Line</h3>
          <label class="style-option"><input type="radio" name="line-mode" value="none" /> No line</label>
          <label class="style-option"><input type="radio" name="line-mode" value="solid" checked /> Solid line</label>
          <label class="style-option"><input type="radio" name="line-mode" value="gradient" /> Gradient line</label>
          <label>Color
            <input id="stroke-color" type="color" value="#2f5f4f" class="style-control" />
          </label>
          <div class="style-row">
            <label class="style-row-label" for="line-transparency-range">Transparency</label>
            <input id="line-transparency-range" type="range" min="0" max="100" value="0" class="style-control style-range" />
            <input id="line-transparency-number" type="number" min="0" max="100" value="0" class="style-control style-percent" aria-label="Line transparency percent" />
          </div>
          <label>Width
            <input id="stroke-width" type="number" min="0.5" max="24" step="0.1" value="2" class="style-control" />
          </label>
          <label>Sketched style
            <select id="line-sketch-style" class="style-control">
              <option value="none" selected>None</option>
              <option value="rough">Rough</option>
            </select>
          </label>
          <label>Compound type
            <select id="line-compound-type" class="style-control">
              <option value="single" selected>Single</option>
              <option value="double">Double</option>
            </select>
          </label>
          <label>Dash type
            <select id="line-dash-type" class="style-control">
              <option value="solid" selected>Solid</option>
              <option value="dash">Dash</option>
              <option value="dot">Dot</option>
              <option value="dash-dot">Dash dot</option>
            </select>
          </label>
          <label>Cap type
            <select id="line-cap-type" class="style-control">
              <option value="butt" selected>Flat</option>
              <option value="round">Round</option>
              <option value="square">Square</option>
            </select>
          </label>
          <label>Join type
            <select id="line-join-type" class="style-control">
              <option value="miter" selected>Miter</option>
              <option value="round">Round</option>
              <option value="bevel">Bevel</option>
            </select>
          </label>
        </section>

        <section class="style-section" aria-label="Text">
          <h3>Text</h3>
          <label>Value
            <input id="text-value" type="text" value="Text" />
          </label>
          <label>Size
            <input id="text-size" type="number" min="10" max="96" value="22" />
          </label>
          <label class="align-label">Align</label>
          <div class="align-control" role="group" aria-label="Text align">
            <button type="button" class="align-btn" data-align="start" title="Align left" aria-label="Align left">
              <span class="align-icon"></span>
            </button>
            <button type="button" class="align-btn active" data-align="middle" title="Align center" aria-label="Align center">
              <span class="align-icon"></span>
            </button>
            <button type="button" class="align-btn" data-align="end" title="Align right" aria-label="Align right">
              <span class="align-icon"></span>
            </button>
          </div>
          <input id="text-align" type="hidden" value="middle" />
        </section>

        <section class="style-section" aria-label="Image Grid">
          <h3>Image Grid</h3>
          <div class="style-row">
            <label class="style-row-label" for="grid-rows">Rows</label>
            <input id="grid-rows" type="number" min="1" max="12" step="1" value="3" class="style-control style-percent" />
          </div>
          <div class="style-row">
            <label class="style-row-label" for="grid-cols">Columns</label>
            <input id="grid-cols" type="number" min="1" max="12" step="1" value="3" class="style-control style-percent" />
          </div>
        </section>
      </aside>
    </main>

    <script type="module" src="./diagram-editor.js"></script>
  </body>
</html>
