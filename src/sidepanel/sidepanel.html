<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Substack Companion</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">S</span>
        <div>
          <h1>Substack Companion</h1>
          <p id="status-text">Waiting for data...</p>
        </div>
      </div>
      <div class="actions">
        <button id="go-to-my-substack">Go to my Substack</button>
        <button id="refresh-substack">Refresh active Substack tab</button>
        <div class="plan-menu" id="plan-menu">
          <button id="plan-button" class="btn-plan basic" aria-haspopup="true" aria-expanded="false">Basic</button>
          <div id="plan-submenu" class="plan-submenu hidden" role="menu" aria-label="Plan destinations"></div>
        </div>
        <button id="reload-extension" title="Reload extension">⟳</button>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <div class="section-header">
          <h2>User and Subscribers</h2>
          <div class="section-controls">
            <button class="btn-toggle" title="Collapse section">^</button>
            <button class="btn-add" data-dialog="dialog-check-subscriber" title="Check subscriber">+</button>
          </div>
        </div>
        <div class="section-body">
          <div id="user-profile" class="list"></div>
        </div>
      </section>

      <section class="card">
        <div class="section-header">
          <h2>Publications and Drafts</h2>
          <div class="section-controls">
            <button class="btn-toggle" title="Collapse section">^</button>
          </div>
        </div>
        <div class="section-body">
          <ul id="publication-tree" class="tree"></ul>
        </div>
      </section>

      <section class="card">
        <div class="section-header">
          <h2>Citations</h2>
          <div class="section-controls">
            <button class="btn-toggle" title="Collapse section">^</button>
            <button class="btn-add" data-dialog="dialog-add-citation" title="Add citation">+</button>
          </div>
        </div>
        <div class="section-body">
          <ul id="citation-list" class="list"></ul>
        </div>
      </section>

      <section class="card">
        <div class="section-header">
          <h2>URLs</h2>
          <div class="section-controls">
            <button class="btn-toggle" title="Collapse section">^</button>
            <button class="btn-add" data-dialog="dialog-add-bookmark" title="Add URL">+</button>
          </div>
        </div>
        <div class="section-body">
          <ul id="bookmark-list" class="list"></ul>
        </div>
      </section>

      <section class="card">
        <div class="section-header">
          <h2>Image Assets</h2>
          <div class="section-controls">
            <button class="btn-toggle" title="Collapse section">^</button>
            <div class="image-add-menu" id="image-add-menu">
              <button id="btn-add-image" class="btn-add" title="Add image">+</button>
              <div id="image-add-submenu" class="image-add-submenu hidden" aria-label="Add image options">
                <button data-action="from-clipboard">From Clipboard</button>
                <button data-action="from-url">From URL</button>
                <hr class="menu-divider" />
                <button data-action="map">Create Map ↗</button>
                <button data-action="diagram-editor">Create Diagram ↗</button>
                <button data-action="graph-tool">Graph Tool ↗</button>
                <button data-action="table">Create Table ↗</button>
              </div>
            </div>
          </div>
        </div>
        <div class="section-body">
          <div id="image-grid" class="image-grid"></div>
        </div>
      </section>

    </main>

    <!-- Dialogs -->
    <dialog id="dialog-check-subscriber">
      <div class="dialog-header">
        <h3>Check Subscriber</h3>
        <button class="btn-dialog-close">✕</button>
      </div>
      <div class="dialog-body">
        <label>Email address
          <input id="subscriber-email" type="email" placeholder="subscriber@email.com" />
        </label>
        <div id="subscriber-result" class="result"></div>
      </div>
      <div class="dialog-footer">
        <button id="check-subscriber">Check</button>
        <button class="btn-dialog-cancel">Cancel</button>
      </div>
    </dialog>

    <dialog id="dialog-add-citation">
      <div class="dialog-header">
        <h3>Add Citation</h3>
        <button class="btn-dialog-close">✕</button>
      </div>
      <div class="dialog-body">
        <label>Quote text
          <textarea id="citation-text" rows="4" placeholder="Paste selected quote"></textarea>
        </label>
        <label>Source URL
          <input id="citation-url" type="url" placeholder="https://example.com/article" />
        </label>
      </div>
      <div class="dialog-footer">
        <button id="save-citation">Save citation</button>
        <button class="btn-dialog-cancel">Cancel</button>
      </div>
    </dialog>

    <dialog id="dialog-add-bookmark">
      <div class="dialog-header">
        <h3>Add URL</h3>
        <button class="btn-dialog-close">✕</button>
      </div>
      <div class="dialog-body">
        <label>URL
          <input id="bookmark-url" type="url" placeholder="https://example.com" />
        </label>
        <label>Title
          <input id="bookmark-title" type="text" placeholder="Page title" />
        </label>
      </div>
      <div class="dialog-footer">
        <button id="save-bookmark">Save URL</button>
        <button class="btn-dialog-cancel">Cancel</button>
      </div>
    </dialog>

    <dialog id="dialog-add-image">
      <div class="dialog-header">
        <h3>Add Image</h3>
        <button class="btn-dialog-close">✕</button>
      </div>
      <div class="dialog-body">
        <label>Image URL
          <input id="image-url" type="url" placeholder="https://example.com/image.jpg" />
        </label>
        <img id="clipboard-image-preview" class="clipboard-preview hidden" src="" alt="Clipboard preview" />
      </div>
      <div class="dialog-footer">
        <button id="save-image">Save image</button>
        <button class="btn-dialog-cancel">Cancel</button>
      </div>
    </dialog>

    <script type="module" src="./sidepanel.js"></script>
  </body>
</html>
